name: SQLens CI

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'
        cache: true

    - name: Install dependencies
      run: go mod tidy

    - name: Run Tests
      run: CGO_ENABLED=0 go test -v ./...

    - name: Build Binary
      run: |
        mkdir -p bin
        CGO_ENABLED=0 go build -v -o bin/sqlens ./cmd/sqlens
