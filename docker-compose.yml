version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: demo
    ports:
      - "5432:5432"

  sqlens:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5433:5433" # Proxy port
      - "8080:8080" # Dashboard port
    environment:
      - SQLENS_LISTEN_ADDR=:5433
      - SQLENS_TARGET_ADDR=postgres:5432
    depends_on:
      - postgres
